version: "3.8"

services:
  expo:
    image: node:20
    container_name: expo-app
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
    - "8081:8081"
    - "19000:19000"
    - "19001:19001"
    - "19002:19002"
    stdin_open: true
    tty: true
    command: sh -c "npm install && npx expo start --lan"